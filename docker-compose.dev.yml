
# =============================================================================
# DEVELOPMENT override — merged on top of docker-compose.yml.
#
# Activate it once by setting this in your .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml
# Then every `docker compose ...` command uses dev automatically.
#
# This file only lists what is DIFFERENT in dev: local builds, live-reload
# bind mounts, exposed ports, and the dev-only workspace + vite helpers.
# Everything else (db, redis, network, volume) is inherited from the base.
# =============================================================================
services:
  # Build the dev image locally and mount the source for live changes
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    image: proyex/app:dev
    container_name: proyex-app-dev
    volumes:
      - .:/var/www/html

  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: web
    image: proyex/web:dev
    container_name: proyex-web-dev
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"

  db:
    container_name: proyex-db-dev

  redis:
    container_name: proyex-redis-dev
    ports:
      - "6379:6379"

  # CLI container for artisan / composer / npm (dev only)
  workspace:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: workspace
    image: proyex/workspace
    container_name: proyex-workspace-dev
    volumes:
      - .:/var/www/html
    networks:
      - proyex
    tty: true

  # Vite dev server with hot module reload (dev only)
  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev # This target has node and npm
    image: proyex/vite
    container_name: proyex-vite-dev
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    networks:
      - proyex
    command: ["npm", "run", "dev", "--", "--host"]
