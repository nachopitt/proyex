
# =============================================================================
# BASE configuration — shared by every environment.
#
# Do NOT run this file on its own. It only describes the *structure* that is
# common to dev and prod (services, network, volume). Each environment adds
# its own thin override on top:
#
#   dev  ->  docker-compose.yml + docker-compose.dev.yml
#   prod ->  docker-compose.yml + docker-compose.prod.yml
#
# You normally never type the file names: set COMPOSE_FILE in your .env once
# (see .env.example) and then just run `docker compose up -d`.
# =============================================================================
services:
  # PHP-FPM application (image/build is defined per-environment)
  app:
    container_name: proyex-app
    restart: unless-stopped
    networks:
      - proyex
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx web server (image/build is defined per-environment)
  web:
    container_name: proyex-web
    restart: unless-stopped
    networks:
      - proyex
    depends_on:
      - app

  # MySQL database
  db:
    image: mysql:8.0
    container_name: proyex-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - proyex-mysql-data:/var/lib/mysql
    networks:
      - proyex
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Redis cache / queue
  redis:
    image: redis:alpine
    container_name: proyex-redis
    restart: unless-stopped
    networks:
      - proyex
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

networks:
  proyex:
    driver: bridge

volumes:
  proyex-mysql-data:
    driver: local
