# =============================================================================
# PRODUCTION override — merged on top of docker-compose.yml.
#
# On the server, set this once in /opt/proyex/.env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml
# Then `docker compose up -d`, `docker compose logs -f app`, etc. all target
# production without any -f flags.
#
# This file only lists what is DIFFERENT in prod: pull the prebuilt images
# from GHCR (no local build) and publish the web port.
#
# The web container is published on 127.0.0.1:8080 (loopback only), NOT 0.0.0.0:80.
# A host reverse proxy (nginx + certbot, see DEPLOYMENT.md) terminates TLS on
# 443/80 and proxies to 127.0.0.1:8080. Binding the container to 80 directly
# would collide with that host nginx ("address already in use").
# =============================================================================
services:
  app:
    image: ghcr.io/nachopitt/proyex-app:${IMAGE_TAG:-latest}

  web:
    image: ghcr.io/nachopitt/proyex-web:${IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:8080:80"
