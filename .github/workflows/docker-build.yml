name: docker build

# Validates that the production Docker images actually build, WITHOUT pushing.
# This is the gate that catches Dockerfile breakages (missing php in the asset
# build, composer/autoloader issues, bad COPY paths, etc.) on a PR — long before
# they can reach a staging or production deploy.

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from .version file
        id: version
        run: echo "app_version=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image (prod target, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile
          target: prod
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}

      - name: Build web image (web target, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile
          target: web
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
