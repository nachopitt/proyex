name: Build and Deploy to Production

# PRODUCTION lane.
# Publishing a GitHub Release PROMOTES the exact images already built and
# verified on staging — it does NOT rebuild from source. The staging images are
# re-tagged by digest to an immutable `release-<version>` tag (and `latest`),
# so production ships the identical artifact you validated on staging.
# Staging is handled by the mirror workflow: build-and-deploy.yml.
#
# Workflow: push to main -> staging updates -> verify -> publish a Release.
# The Release must be cut from the commit currently reflected on staging.

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/nachopitt/proyex-app
  WEB_IMAGE: ghcr.io/nachopitt/proyex-web
  # Immutable, versioned tag this lane promotes to (e.g. release-v1.2.0).
  IMAGE_TAG: release-${{ github.event.release.tag_name }}
  # The staging tag being promoted (the artifact validated on staging).
  SOURCE_TAG: staging

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Re-tag the existing staging image by DIGEST (no rebuild). imagetools
      # creates new tags that point at the same manifest/digest already in GHCR.
      - name: Promote app image (staging -> release + latest)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.APP_IMAGE }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.APP_IMAGE }}:latest \
            ${{ env.APP_IMAGE }}:${{ env.SOURCE_TAG }}

      - name: Promote web image (staging -> release + latest)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.WEB_IMAGE }}:latest \
            ${{ env.WEB_IMAGE }}:${{ env.SOURCE_TAG }}

  deploy:
    needs: promote
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        env:
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          DEPLOY_DIR: /opt/proyex
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

          # Ship ONLY the compose files (the server never holds the source).
          # The application code lives inside the images pulled from GHCR.
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST "mkdir -p $DEPLOY_DIR"
          scp -i ~/.ssh/deploy_key \
            docker-compose.yml docker-compose.prod.yml \
            $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/

          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST DEPLOY_DIR="$DEPLOY_DIR" IMAGE_TAG="$IMAGE_TAG" 'bash -s' << 'EOF'
          set -e
          cd "$DEPLOY_DIR"
          export COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml
          docker compose pull
          docker compose up -d --wait
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan cache:clear
          docker compose exec -T app php artisan config:cache
          echo "Production deployment successful!"
          EOF
