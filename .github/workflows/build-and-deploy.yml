name: Build and Deploy to Staging

# STAGING lane.
# Every push to main builds fresh images and deploys them to the STAGING server.
# This is the fast-feedback environment: main is always reflected here.
# Production is handled by the mirror workflow: deploy-on-release.yml.

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/nachopitt/proyex-app
  WEB_IMAGE: ghcr.io/nachopitt/proyex-web
  # Image tag this lane builds and deploys. Staging never touches `latest`.
  IMAGE_TAG: staging

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (app)
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=sha
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: Extract metadata (web)
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
          DEPLOY_DIR: /opt/proyex-staging
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

          # Ship ONLY the compose files (the server never holds the source).
          # The application code lives inside the images pulled from GHCR.
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST "mkdir -p $DEPLOY_DIR"
          scp -i ~/.ssh/deploy_key \
            docker-compose.yml docker-compose.prod.yml \
            $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/

          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST DEPLOY_DIR="$DEPLOY_DIR" IMAGE_TAG="$IMAGE_TAG" 'bash -s' << 'EOF'
          set -e
          cd "$DEPLOY_DIR"
          export COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml
          docker compose pull
          docker compose up -d
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan cache:clear
          docker compose exec -T app php artisan config:cache
          echo "Staging deployment successful!"
          EOF
