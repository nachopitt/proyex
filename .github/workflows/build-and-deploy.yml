name: Build and Deploy to Staging

# STAGING / main lane.
# Every push to main BUILDS and pushes the `staging` image to GHCR (no deploy).
# Deploying the latest main build to the server is MANUAL: trigger this workflow
# via "Run workflow" (workflow_dispatch) when you want to test main on the
# droplet. That deploy targets the SAME single droplet as production and
# temporarily replaces the running prod stack with the `staging` image.
# To restore production afterwards, re-run the release deploy (deploy-on-release.yml)
# or, on the server, `IMAGE_TAG=release-<version> docker compose up -d --wait`.
#
# Production is handled by the mirror workflow: deploy-on-release.yml.

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/nachopitt/proyex-app
  WEB_IMAGE: ghcr.io/nachopitt/proyex-web
  # Image tag this lane builds and deploys. Staging never touches `latest`.
  IMAGE_TAG: staging

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from .version file
        id: version
        run: echo "app_version=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (app)
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=sha
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: Extract metadata (web)
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            APP_VERSION=${{ steps.version.outputs.app_version }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile
          target: web
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            APP_VERSION=${{ steps.version.outputs.app_version }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Build runs on every push to main, but DEPLOY only happens when you manually
    # trigger this workflow (Run workflow). This prevents every push to main from
    # replacing prod on the single droplet.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy latest main build to the droplet (manual)
        env:
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          DEPLOY_DIR: /opt/proyex
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_KEY" ]; then
            echo "::error::Missing deploy secrets. Set PROD_DEPLOY_HOST/USER/KEY in repo settings."
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          # Ship ONLY the compose files (the server never holds the source).
          # The application code lives inside the images pulled from GHCR.
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p $DEPLOY_DIR"
          scp -i ~/.ssh/deploy_key \
            docker-compose.yml docker-compose.prod.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/"

          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" DEPLOY_DIR="$DEPLOY_DIR" IMAGE_TAG="$IMAGE_TAG" 'bash -s' << 'EOF'
          set -e
          cd "$DEPLOY_DIR"
          export COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml
          docker compose pull
          docker compose up -d --wait
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan cache:clear
          docker compose exec -T app php artisan config:cache
          echo "Deployed main (staging image) to the droplet for testing."
          EOF
